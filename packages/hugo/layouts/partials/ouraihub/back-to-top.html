{{/* Back to top button */}}
{{/* Usage: {{ partial "ouraihub/back-to-top.html" . }} */}}

  data-controller="back-to-top"
  data-back-to-top-threshold="{{ default 0.3 .Site.Params.backToTopThreshold }}"

  aria-label="Back to top"
>↑</button>

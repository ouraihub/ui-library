{{/* Share links */}}
{{ $url := .Permalink }}
{{ $title := .Title }}
<div class="share-links">
  <a href="https://twitter.com/intent/tweet?url={{ $url }}&text={{ $title }}" target="_blank" rel="noopener noreferrer">Twitter</a>
  <a href="https://www.facebook.com/sharer.php?u={{ $url }}" target="_blank" rel="noopener noreferrer">Facebook</a>
  <a href="https://www.linkedin.com/sharing/share-offsite/?url={{ $url }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
  <a href="https://t.me/share/url?url={{ $url }}&text={{ $title }}" target="_blank" rel="noopener noreferrer">Telegram</a>
  <a href="https://wa.me/?text={{ $title }}%20{{ $url }}" target="_blank" rel="noopener noreferrer">WhatsApp</a>
</div>

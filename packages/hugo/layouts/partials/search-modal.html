{{- $searchEndpoint := .searchEndpoint | default "/search.json" -}}
{{- $placeholder := .placeholder | default "搜索..." -}}
{{- $noResultsText := .noResultsText | default "未找到结果" -}}

<div 
  data-ui-component="search-modal"
  data-ui-search-endpoint="{{ $searchEndpoint }}"
  class="search-modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="search-modal-title"
  aria-hidden="true"
>
  <div class="search-modal-overlay" aria-hidden="true"></div>
  
  <div class="search-modal-content">
    <div class="search-modal-header">
      <h2 id="search-modal-title" class="search-modal-title">搜索</h2>
      <button 
        class="search-modal-close"
        aria-label="关闭搜索"
        type="button"
      >
        <span aria-hidden="true">×</span>
      </button>
    </div>

    <div class="search-modal-body">
      <div class="search-input-wrapper">
        <input 
          type="search"
          class="search-input"
          placeholder="{{ $placeholder }}"
          aria-label="搜索内容"
          aria-describedby="search-shortcut-hint"
          autocomplete="off"
          spellcheck="false"
        />
        <kbd id="search-shortcut-hint" class="search-shortcut">
          <span class="search-shortcut-key">Ctrl</span>
          <span class="search-shortcut-separator">+</span>
          <span class="search-shortcut-key">K</span>
        </kbd>
      </div>

      <div 
        class="search-results"
        role="listbox"
        aria-label="搜索结果"
      >
        <div class="search-loading" aria-live="polite" aria-hidden="true">
          <span class="search-loading-spinner" aria-hidden="true"></span>
          <span>搜索中...</span>
        </div>

        <div class="search-no-results" aria-live="polite" aria-hidden="true">
          {{ $noResultsText }}
        </div>

        <ul class="search-results-list" aria-hidden="true">
          <!-- 搜索结果将通过 JavaScript 动态插入 -->
        </ul>
      </div>
    </div>

    <div class="search-modal-footer">
      <div class="search-shortcuts">
        <span class="search-shortcut-item">
          <kbd>↑↓</kbd> 导航
        </span>
        <span class="search-shortcut-item">
          <kbd>Enter</kbd> 选择
        </span>
        <span class="search-shortcut-item">
          <kbd>Esc</kbd> 关闭
        </span>
      </div>
    </div>
  </div>
</div>

<style>
.search-modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 1000;
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 4rem 1rem;
}

.search-modal[aria-hidden="false"] {
  display: flex;
}

.search-modal-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
}

.search-modal-content {
  position: relative;
  width: 100%;
  max-width: 40rem;
  background: var(--ui-background, #ffffff);
  border-radius: 0.5rem;
  box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
  display: flex;
  flex-direction: column;
  max-height: calc(100vh - 8rem);
}

.search-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--ui-border, #e0e0e0);
}

.search-modal-title {
  margin: 0;
  font-size: 1.125rem;
  font-weight: 600;
  color: var(--ui-text, #333333);
}

.search-modal-close {
  border: none;
  background: transparent;
  font-size: 1.5rem;
  line-height: 1;
  cursor: pointer;
  padding: 0.25rem;
  color: var(--ui-text-secondary, #666666);
  transition: color 0.2s ease;
}

.search-modal-close:hover {
  color: var(--ui-text, #333333);
}

.search-modal-body {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.search-input-wrapper {
  position: relative;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid var(--ui-border, #e0e0e0);
}

.search-input {
  width: 100%;
  padding: 0.75rem 1rem;
  padding-right: 6rem;
  border: 1px solid var(--ui-border, #e0e0e0);
  border-radius: 0.375rem;
  font-size: 1rem;
  background: var(--ui-background, #ffffff);
  color: var(--ui-text, #333333);
  transition: border-color 0.2s ease;
}

.search-input:focus {
  outline: none;
  border-color: var(--ui-primary, #0066cc);
}

.search-shortcut {
  position: absolute;
  right: 2.5rem;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  gap: 0.25rem;
  align-items: center;
  font-size: 0.75rem;
  color: var(--ui-text-secondary, #666666);
}

.search-shortcut-key {
  padding: 0.125rem 0.375rem;
  border: 1px solid var(--ui-border, #e0e0e0);
  border-radius: 0.25rem;
  background: var(--ui-background-secondary, #f9f9f9);
  font-family: monospace;
}

.search-shortcut-separator {
  padding: 0 0.125rem;
}

.search-results {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 0;
}

.search-loading,
.search-no-results {
  padding: 2rem 1.5rem;
  text-align: center;
  color: var(--ui-text-secondary, #666666);
}

.search-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
}

.search-loading-spinner {
  width: 2rem;
  height: 2rem;
  border: 3px solid var(--ui-border, #e0e0e0);
  border-top-color: var(--ui-primary, #0066cc);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.search-results-list {
  list-style: none;
  margin: 0;
  padding: 0;
}

.search-result-item {
  margin: 0;
}

.search-result-link {
  display: block;
  padding: 0.75rem 1.5rem;
  color: var(--ui-text, #333333);
  text-decoration: none;
  transition: background-color 0.2s ease;
}

.search-result-link:hover,
.search-result-link[aria-selected="true"] {
  background: var(--ui-background-hover, #f5f5f5);
}

.search-result-title {
  font-weight: 600;
  margin-bottom: 0.25rem;
}

.search-result-excerpt {
  font-size: 0.875rem;
  color: var(--ui-text-secondary, #666666);
  line-height: 1.5;
}

.search-result-highlight {
  background: var(--ui-highlight, #fef08a);
  font-weight: 600;
}

.search-modal-footer {
  padding: 0.75rem 1.5rem;
  border-top: 1px solid var(--ui-border, #e0e0e0);
  background: var(--ui-background-secondary, #f9f9f9);
}

.search-shortcuts {
  display: flex;
  gap: 1rem;
  justify-content: center;
  font-size: 0.75rem;
  color: var(--ui-text-secondary, #666666);
}

.search-shortcut-item kbd {
  padding: 0.125rem 0.375rem;
  border: 1px solid var(--ui-border, #e0e0e0);
  border-radius: 0.25rem;
  background: var(--ui-background, #ffffff);
  font-family: monospace;
  margin-right: 0.25rem;
}

@media (max-width: 768px) {
  .search-modal {
    padding: 0;
    align-items: stretch;
  }

  .search-modal-content {
    max-width: none;
    border-radius: 0;
    max-height: 100vh;
  }

  .search-shortcut {
    display: none;
  }
}
</style>

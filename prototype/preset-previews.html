<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preset Previews</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: #f3f6fb;
      color: #1d2430;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 42px;
      line-height: 1.1;
    }
    p {
      margin: 0;
      font-size: 18px;
      line-height: 1.7;
      color: #5c6573;
      max-width: 760px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
      margin-top: 32px;
    }
    .card {
      background: #fff;
      border: 1px solid #dbe3ef;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 18px 42px rgba(17, 25, 40, 0.08);
    }
    .thumb {
      height: 220px;
      border-radius: 16px;
      margin-bottom: 18px;
      border: 1px solid #dbe3ef;
    }
    .blog {
      background:
        linear-gradient(180deg, rgba(255,255,255,0.1), rgba(255,255,255,0.1)),
        linear-gradient(135deg, #e8f1ff, #fff6da);
      position: relative;
      overflow: hidden;
    }
    .blog::before,
    .blog::after {
      content: "";
      position: absolute;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 14px 28px rgba(16, 24, 40, 0.08);
    }
    .blog::before {
      left: 18px;
      top: 18px;
      width: 130px;
      height: 160px;
    }
    .blog::after {
      right: 18px;
      bottom: 18px;
      width: 150px;
      height: 90px;
    }
    .docs {
      background: linear-gradient(135deg, #eef4ff, #f8fbff);
      position: relative;
      overflow: hidden;
    }
    .docs::before,
    .docs::after {
      content: "";
      position: absolute;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 14px 28px rgba(16, 24, 40, 0.08);
    }
    .docs::before {
      left: 14px;
      top: 14px;
      width: 58px;
      height: 190px;
    }
    .docs::after {
      left: 86px;
      top: 14px;
      right: 14px;
      bottom: 14px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    .meta {
      color: #0f6fff;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .link {
      display: inline-flex;
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 12px;
      background: #0f6fff;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>两个预设到底会把站点带向什么气质</h1>
    <p>这里不是组件清单，而是视觉原型。打开下面两个页面，你能直接看到 `preset-blog` 和 `preset-docs` 更像什么类型的网站。</p>

    <div class="grid">
      <section class="card">
        <div class="thumb blog"></div>
        <div class="meta">内容消费型 · 阅读优先</div>
        <h2>@ouraihub/preset-blog</h2>
        <p>更像博客、专栏和文章型站点。首页是卡片流，详情页是长文阅读区，作者、标签、相关文章这些元素会更自然地出现。</p>
        <a class="link" href="./preset-blog-preview.html">打开 Blog 预览</a>
      </section>

      <section class="card">
        <div class="thumb docs"></div>
        <div class="meta">技术说明型 · 导航优先</div>
        <h2>@ouraihub/preset-docs</h2>
        <p>更像产品文档、SDK 文档和帮助中心。左侧导航、中间正文、右侧目录，代码块、提示框、API 区块会更自然。</p>
        <a class="link" href="./preset-docs-preview.html">打开 Docs 预览</a>
      </section>
    </div>
  </div>
</body>
</html>

{{/*
  基础主题切换按钮
  
  使用方法:
  {{ partial "theme-toggle.html" . }}
  
  自定义属性:
  - data-ui-storage-key: localStorage 键名（默认: "theme"）
  - data-ui-attribute: HTML 属性名（默认: "data-theme"）
*/}}

<button 
  data-ui-component="theme-toggle"
  data-ui-storage-key="theme"
  data-ui-attribute="data-theme"
  class="theme-toggle-btn"
  aria-label="切换主题"
  type="button"
>
  <span class="theme-icon-light" aria-hidden="true">☀️</span>
  <span class="theme-icon-dark" aria-hidden="true">🌙</span>
</button>

<style>
/* 主题切换按钮基础样式 */
.theme-toggle-btn {
  /* 布局 */
  display: inline-flex;
  align-items: center;
  justify-content: center;
  
  /* 尺寸 */
  width: 2.5rem;
  height: 2.5rem;
  padding: 0.5rem;
  
  /* 外观 */
  border: 1px solid var(--ui-border, #e0e0e0);
  background: var(--ui-background, #ffffff);
  border-radius: 0.375rem;
  
  /* 交互 */
  cursor: pointer;
  transition: all 0.2s ease;
  
  /* 无障碍 */
  outline-offset: 2px;
}

/* 悬停效果 */
.theme-toggle-btn:hover {
  background: var(--ui-background-hover, #f5f5f5);
  border-color: var(--ui-border-hover, #d0d0d0);
}

/* 焦点效果（键盘导航） */
.theme-toggle-btn:focus-visible {
  outline: 2px solid var(--ui-focus, #3b82f6);
  outline-offset: 2px;
}

/* 按下效果 */
.theme-toggle-btn:active {
  transform: scale(0.95);
}

/* 图标样式 */
.theme-icon-light,
.theme-icon-dark {
  font-size: 1.25rem;
  line-height: 1;
  transition: opacity 0.2s ease;
}

/* 根据主题显示/隐藏图标 */
[data-theme="light"] .theme-icon-dark,
[data-theme="dark"] .theme-icon-light {
  display: none;
}

/* Dark 主题下的按钮样式 */
[data-theme="dark"] .theme-toggle-btn {
  border-color: var(--ui-border-dark, #404040);
  background: var(--ui-background-dark, #1a1a1a);
}

[data-theme="dark"] .theme-toggle-btn:hover {
  background: var(--ui-background-hover-dark, #2a2a2a);
  border-color: var(--ui-border-hover-dark, #505050);
}
</style>
